repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9  # pin to the latest stable Ruff release
    hooks:
      - id: ruff
        args: [--fix]   # auto-fix lint issues
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0   # or latest stable
    hooks:
      - id: mypy
        additional_dependencies: [pandas, numpy, types-requests]
