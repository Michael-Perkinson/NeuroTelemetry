name: Build and Upload Artifacts

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v2.3.1, etc.

permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name "PressureAnalyzer" main.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: PressureAnalyzer-Windows
          path: dist/PressureAnalyzer.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install py2app
          brew install create-dmg

      - name: Build macOS .app
        run: |
          python setup.py py2app

      - name: Create macOS .dmg
        run: |
          create-dmg \
            --volname "PressureAnalyzer" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 400 150 \
            dist/PressureAnalyzer.app \
            dist/

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: PressureAnalyzer-macOS
          path: dist/PressureAnalyzer.dmg
