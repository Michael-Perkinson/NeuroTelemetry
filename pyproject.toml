[tool.ruff]
line-length = 88       # bump to reduce E501 spam
indent-width = 4
target-version = "py312"   # until Ruff supports py313

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.mypy]
python_version = "3.13"
check_untyped_defs = true
disallow_untyped_defs = false
ignore_missing_imports = true
follow_imports = "skip"
show_error_codes = true
pretty = true
warn_unused_ignores = false
warn_return_any = false
warn_unused_configs = true
